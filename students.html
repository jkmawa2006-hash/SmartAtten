<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students - SmartAtten</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg">
  <script>!function(){var t=localStorage.getItem("institrack_theme")||(window.matchMedia("(prefers-color-scheme:light)").matches?"light":"dark");document.documentElement.setAttribute("data-theme",t)}();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .dir-filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
    .dir-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .student-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
    .student-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;transition:var(--transition);cursor:pointer}
    .student-card:hover{border-color:var(--border-light);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
    .student-card .savatar{width:44px;height:44px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin-bottom:10px;color:#fff}
    .student-card .sname{font-weight:600;font-size:14px}
    .student-card .smeta{color:var(--text-light);font-size:11px;margin-top:2px}
    .student-card .sbar{height:4px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0}
    .student-card .sbar-fill{height:100%;border-radius:3px}
    .detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
    .detail-row:last-child{border:none}
    .detail-label{color:var(--text-light)}
    .detail-value{font-weight:600}
    .sort-header{cursor:pointer;user-select:none;transition:var(--transition)}
    .sort-header:hover{color:var(--primary)}
    .pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px 0 4px}
    .page-btn{width:32px;height:32px;border:none;border-radius:6px;background:var(--bg-card);color:var(--text-light);cursor:pointer;font-size:12px;font-weight:500;transition:var(--transition);font-family:var(--font)}
    .page-btn:hover{background:var(--bg-surface);color:var(--text)}
    .page-btn.active{background:var(--primary);color:#fff;box-shadow:0 4px 15px var(--primary-glow)}
    .page-btn:disabled{opacity:0.3;cursor:default}
    .view-toggle{display:flex;gap:3px;padding:3px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px}
    .view-btn{padding:6px 10px;border:none;background:transparent;color:var(--text-light);border-radius:4px;cursor:pointer;font-size:13px;transition:var(--transition)}
    .view-btn.active{background:var(--bg-surface);color:var(--text)}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:500}
    .chip-dept{background:rgba(0,145,160,0.1);color:var(--primary)}
    .s-contact{font-size:11px;color:var(--text-muted);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
    .s-contact span{display:inline-flex;align-items:center;gap:4px}
    .s-contact i{font-size:10px;width:12px;text-align:center}
    .search-wrap{position:relative}
    .search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;transition:var(--transition)}
    .search-wrap input{padding-left:32px}
    .search-wrap.focused i{color:var(--primary)}
    .page-jump{display:flex;align-items:center;gap:4px}
    .page-jump input{width:40px;padding:4px;text-align:center;font-size:11px;border-radius:4px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-family:var(--font);outline:none}
    .page-jump input:focus{border-color:var(--primary)}
    td .row-check{width:18px;height:18px;accent-color:var(--primary);cursor:pointer}
    th .row-check{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
    .bulk-bar .actions{display:flex;gap:8px;margin-left:auto}
    .bulk-bar .actions button{font-size:11px;padding:5px 12px}
    .subj-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
    .subj-row:last-child{border:none}
    .subj-row .subj-name{flex:1;color:var(--text-light)}
    .subj-row .subj-bar{width:80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    .subj-row .subj-bar div{height:100%;border-radius:3px}
    .subj-row .subj-pct{width:36px;text-align:right;font-weight:600;font-size:12px}
    @media(max-width:768px){.dir-filters{grid-template-columns:1fr 1fr}.student-card-grid{grid-template-columns:1fr}.s-contact{flex-direction:column;gap:2px}}
  </style>
</head>
<body>
  <div class="toast-container"></div>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo"><img src="assets/img/logo.svg" alt="SmartAtten" style="width:52px;height:52px;display:block"></div>
    <div class="loading-bar"><div class="loading-bar-inner"></div></div>
    <div class="loading-text">Loading Directory</div>
  </div>
  <div class="bg-grid"></div>

  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon"><img src="assets/img/logo.svg" alt="SmartAtten" style="width:24px;height:24px;display:block"></div>
      <div class="logo-text">SmartAtten</div>
    </div>
    <div class="nav-section">
      <div class="sidebar-heading">Main</div>
      <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
      <a href="attendance.html" class="nav-link"><i class="fas fa-clipboard-check"></i> <span>Attendance</span></a>
      <a href="reports.html" class="nav-link"><i class="fas fa-chart-bar"></i> <span>Reports</span></a>
      <a href="students.html" class="nav-link active"><i class="fas fa-users"></i> <span>Students</span></a>
    </div>
    <div class="nav-section">
      <div class="sidebar-heading">Management</div>
      <a href="absenteeism.html" class="nav-link"><i class="fas fa-user-graduate"></i> <span>Absenteeism</span></a>
      <a href="timetable.html" class="nav-link"><i class="fas fa-calendar-alt"></i> <span>Timetable</span></a>
      <a href="leaves.html" class="nav-link"><i class="fas fa-door-open"></i> <span>Leaves</span></a>
      <a href="fees.html" class="nav-link"><i class="fas fa-wallet"></i> <span>Fees</span></a>
    </div>
    <div class="nav-section" style="margin-top:auto;border-top:1px solid var(--border);padding-top:16px">
      <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> <span>Settings</span></a>
      <a href="#" onclick="App.logout()" class="nav-link"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle"><i class="fas fa-bars"></i></button>
        <h3 style="font-size:16px;font-weight:700;letter-spacing:-0.3px">Student Directory</h3>
        <span class="live-clock"></span>
      </div>
      <div class="topbar-right">
        <span class="badge badge-info" id="roleBadge" style="font-size:9px">Teacher</span>

        <button class="theme-toggle"><i class="fas fa-moon"></i></button>
        <button class="notif-btn"><i class="fas fa-bell"></i><span class="notif-badge" id="notifCount">0</span></button>
        <div class="user-avatar" id="avatarEl"></div>
      </div>
    </div>

    <div class="page-content">
      <div class="stat-cards" id="studentStats"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
        <div class="card">
          <div class="card-header"><h4>Attendance Distribution</h4></div>
          <div class="card-body"><canvas id="distChart" height="180"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><h4>Department Breakdown</h4></div>
          <div class="card-body" id="deptBreakdown" style="padding:12px"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-body" style="padding:16px">
          <div class="dir-filters">
            <div class="form-group" style="margin:0">
              <label class="form-label">Department</label>
              <select id="filterDept"><option value="">All Departments</option></select>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Class</label>
              <select id="filterClass"><option value="">All Classes</option></select>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Attendance</label>
              <select id="filterAtt">
                <option value="">All</option>
                <option value="good">Good (&ge;75%)</option>
                <option value="warning">Warning (60-74%)</option>
                <option value="critical">Critical (&lt;60%)</option>
              </select>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Search</label>
              <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Name, roll, email, class...">
              </div>
            </div>
          </div>
          <div class="dir-actions">
            <div class="view-toggle">
              <button class="view-btn active" onclick="setView('table')" title="Table"><i class="fas fa-table"></i></button>
              <button class="view-btn" onclick="setView('grid')" title="Grid"><i class="fas fa-th-large"></i></button>
            </div>
            <span style="color:var(--text-light);font-size:12px" id="resultCount"></span>
            <span id="searchLoading" style="color:var(--text-muted);font-size:11px;display:none"><i class="fas fa-spinner fa-spin"></i></span>
            <div style="flex:1"></div>
            <button class="btn btn-sm btn-outline" onclick="exportStudentCSV()"><i class="fas fa-file-csv"></i> Export</button>
            <div style="display:flex;align-items:center;gap:4px">
              <span style="color:var(--text-light);font-size:11px">Show</span>
              <select id="pageSize" onchange="renderStudents()" style="width:auto;padding:4px 24px 4px 8px;font-size:11px">
                <option value="15">15</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
          </div>

          <div class="bulk-bar" id="bulkBar">
            <span><strong class="count" id="bulkCount">0</strong> selected</span>
            <div class="actions">
              <button class="btn btn-sm btn-outline" onclick="exportSelectedCSV()"><i class="fas fa-file-csv"></i> Export</button>
              <button class="btn btn-sm btn-primary" onclick="markSelected()"><i class="fas fa-check"></i> Mark Present</button>
              <button class="btn btn-sm btn-ghost" onclick="clearSelection()">Clear</button>
            </div>
          </div>

          <div id="tableView">
            <div class="table-container" style="border:none;border-radius:0">
              <table>
                <thead>
                  <tr>
                    <th style="width:32px"><input type="checkbox" class="row-check" id="selectAll" onchange="toggleSelectAll(this)"></th>
                    <th class="sort-header" onclick="sortBy('name')">Student <span id="sort-name" style="font-size:10px">â†•</span></th>
                    <th class="sort-header hide-mobile" onclick="sortBy('class')">Class <span id="sort-class" style="font-size:10px">â†•</span></th>
                    <th class="sort-header hide-mobile" onclick="sortBy('dept')">Department <span id="sort-dept" style="font-size:10px">â†•</span></th>
                    <th class="sort-header" onclick="sortBy('attendance')">Attendance <span id="sort-attendance" style="font-size:10px">â†•</span></th>
                    <th>Status</th>
                    <th style="width:80px">Action</th>
                  </tr>
                </thead>
                <tbody id="tableBody"></tbody>
              </table>
            </div>
          </div>
          <div id="gridView" style="display:none">
            <div class="student-card-grid" id="gridBody"></div>
          </div>

          <div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 0 0">
            <div class="pagination" id="pagination"></div>
            <div class="page-jump">
              <span style="color:var(--text-muted);font-size:11px">Go to</span>
              <input type="number" id="pageJumpInput" min="1" placeholder="#" onkeydown="if(event.key==='Enter')jumpToPage()">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal" style="max-width:620px;padding:0;overflow:hidden">
      <div style="padding:24px 24px 0;display:flex;justify-content:space-between;align-items:start">
        <div id="detailHeader" style="display:flex;align-items:center;gap:14px">
          <div id="detailAvatar" style="width:52px;height:52px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff"></div>
          <div>
            <h3 id="detailName" style="font-size:18px;font-weight:700;margin:0"></h3>
            <p id="detailMeta" style="color:var(--text-light);font-size:12px;margin:2px 0 0"></p>
            <p id="detailContact" style="color:var(--text-muted);font-size:11px;margin:2px 0 0"></p>
          </div>
        </div>
        <button onclick="closeDetail()" style="background:none;border:none;color:var(--text-light);font-size:22px;cursor:pointer">&times;</button>
      </div>
      <div style="padding:16px 24px 0">
        <div class="tabs" style="margin-bottom:0;border-radius:8px">
          <button class="tab active" data-dtab="overview" onclick="switchDetailTab(this,'overview')">Overview</button>
          <button class="tab" data-dtab="attendance" onclick="switchDetailTab(this,'attendance')">Attendance</button>
          <button class="tab" data-dtab="fees" onclick="switchDetailTab(this,'fees')">Fees</button>
          <button class="tab" data-dtab="leaves" onclick="switchDetailTab(this,'leaves')">Leaves</button>
        </div>
      </div>
      <div id="detailContent" style="padding:0 24px 24px;min-height:200px"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    const AVATAR_COLORS = ["#0091A0","#6366f1","#ec4899","#f59e0b","#10b981","#8b5cf6","#ef4444","#06b6d4","#f97316","#14b8a6"];

    function hashColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    }

    let distChartInstance = null;
    let currentView = 'table';
    let currentPage = 1;
    let sortField = 'name';
    let sortDir = 'asc';
    let filteredStudents = [];
    let currentStudentId = null;
    let selectedIds = new Set();
    let searchTimer = null;

    document.addEventListener("DOMContentLoaded", function() {
      const check = setInterval(() => {
        if (typeof App !== "undefined" && App.currentUser) {
          initDirectory();
          clearInterval(check);
        }
      }, 100);
    });

    function initDirectory() {
      AppData.departments.forEach(d => {
        document.getElementById("filterDept").innerHTML += `<option value="${d.code}">${d.name}</option>`;
      });
      AppData.classes.forEach(c => {
        document.getElementById("filterClass").innerHTML += `<option value="${c}">${c}</option>`;
      });

      document.getElementById("filterDept").addEventListener("change", () => {
        const dept = document.getElementById("filterDept").value;
        const sel = document.getElementById("filterClass");
        sel.innerHTML = '<option value="">All Classes</option>';
        const classes = dept ? AppData.classes.filter(c => c.startsWith(dept)) : AppData.classes;
        classes.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        currentPage = 1; renderStudents();
      });
      document.getElementById("filterClass").addEventListener("change", () => { currentPage = 1; renderStudents(); });
      document.getElementById("filterAtt").addEventListener("change", () => { currentPage = 1; renderStudents(); });

      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("input", () => {
        const loading = document.getElementById("searchLoading");
        loading.style.display = "inline";
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { currentPage = 1; renderStudents(); loading.style.display = "none"; }, 250);
      });
      searchInput.addEventListener("focus", () => document.querySelector(".search-wrap")?.classList.add("focused"));
      searchInput.addEventListener("blur", () => document.querySelector(".search-wrap")?.classList.remove("focused"));

      renderStudents();
      renderDistributionChart();
    }

    function getStudents() {
      const dept = document.getElementById("filterDept").value;
      const cls = document.getElementById("filterClass").value;
      const attFilter = document.getElementById("filterAtt").value;
      const query = document.getElementById("searchInput").value.toLowerCase().trim();

      let students = Store.getStudents().map(s => {
        const pct = Store.calcAttendancePercent ? Store.calcAttendancePercent(s.id, 30) : s.attendance;
        const deptCode = s.class.replace(/[0-9]/g, '');
        const deptName = AppData.departments.find(d => d.code === deptCode)?.name || deptCode;
        const avatarColor = hashColor(s.name + s.roll);
        return { ...s, attendancePct: pct, deptName, avatarColor };
      });

      if (dept) students = students.filter(s => s.class.startsWith(dept));
      if (cls) students = students.filter(s => s.class === cls);
      if (attFilter === 'good') students = students.filter(s => s.attendancePct >= 75);
      else if (attFilter === 'warning') students = students.filter(s => s.attendancePct >= 60 && s.attendancePct < 75);
      else if (attFilter === 'critical') students = students.filter(s => s.attendancePct < 60);
      if (query) students = students.filter(s =>
        s.name.toLowerCase().includes(query) ||
        s.roll.toLowerCase().includes(query) ||
        s.class.toLowerCase().includes(query) ||
        (s.email && s.email.toLowerCase().includes(query)) ||
        (s.phone && s.phone.includes(query))
      );

      students.sort((a, b) => {
        let va = a[sortField], vb = b[sortField];
        if (sortField === 'attendance') { va = a.attendancePct; vb = b.attendancePct; }
        if (sortField === 'dept') { va = a.deptName; vb = b.deptName; }
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      return students;
    }

    function renderStudents() {
      let students = getStudents();
      filteredStudents = students;

      const today = Store.getTodayAttendance();
      const total = Store.getStudents().length;
      const presentNow = today.filter(r => r.status === "present").length;
      const atRisk = students.filter(s => s.attendancePct < 75).length;
      const avgAtt = students.length ? Math.round(students.reduce((s, st) => s + st.attendancePct, 0) / students.length) : 0;

      document.getElementById("studentStats").innerHTML = [
        { icon: "fa-user-graduate", value: total, label: "Total Students", color: "#0091A0", sub: filteredStudents.length + " shown" },
        { icon: "fa-check-circle", value: presentNow, label: "Present Today", color: "#00e676" },
        { icon: "fa-exclamation-triangle", value: atRisk, label: "At Risk", color: "#ff4060" },
        { icon: "fa-chart-line", value: avgAtt + "%", label: "Avg Attendance", color: "#8b5cf6" }
      ].map(s => `<div class="stat-card" style="border-left:3px solid ${s.color}">
        <div class="stat-icon" style="background:${s.color}12;color:${s.color}"><i class="fas ${s.icon}"></i></div>
        <div class="stat-info"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div><small style="color:var(--text-light);font-size:10px">${s.sub || ''}</small></div>
      </div>`).join("");

      const pageSize = parseInt(document.getElementById("pageSize").value);
      const totalPages = Math.ceil(students.length / pageSize) || 1;
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * pageSize;
      const page = students.slice(start, start + pageSize);

      document.getElementById("resultCount").textContent = `${students.length} student${students.length !== 1 ? 's' : ''}`;

      renderTable(page);
      renderGrid(page);
      renderPagination(totalPages);
      updateBulkBar();

      const good = students.filter(s => s.attendancePct >= 75).length;
      const warn = students.filter(s => s.attendancePct >= 60 && s.attendancePct < 75).length;
      const crit = students.filter(s => s.attendancePct < 60).length;

      const deptBreak = document.getElementById("deptBreakdown");
      deptBreak.innerHTML = AppData.departments.map(d => {
        const inDept = students.filter(s => s.class.startsWith(d.code));
        const deptAvg = inDept.length ? Math.round(inDept.reduce((sum, s) => sum + s.attendancePct, 0) / inDept.length) : 0;
        const barColor = deptAvg >= 75 ? "#00e676" : deptAvg >= 60 ? "#ffab00" : "#ff4060";
        return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0">
          <span style="width:36px;font-size:11px;font-weight:600;color:var(--text-light)">${d.code}</span>
          <div style="flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${deptAvg}%;background:${barColor};border-radius:3px"></div>
          </div>
          <span style="width:50px;text-align:right;font-size:11px;font-weight:600;color:${barColor}">${deptAvg}%</span>
          <span style="width:28px;text-align:right;font-size:10px;color:var(--text-muted)">${inDept.length}</span>
        </div>`;
      }).join("");

      if (distChartInstance) distChartInstance.destroy();
      distChartInstance = new Chart(document.getElementById("distChart"), {
        type: "doughnut",
        data: {
          labels: ["Good (â‰¥75%)", "Warning (60-74%)", "Critical (<60%)"],
          datasets: [{ data: [good, warn, crit], backgroundColor: ["#00e676", "#ffab00", "#ff4060"], borderWidth: 0 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: "bottom", labels: { font: { size: 10 }, padding: 12 } } },
          cutout: "65%"
        }
      });
    }

    function renderTable(page) {
      const body = document.getElementById("tableBody");
      body.innerHTML = page.map(s => {
        const pct = s.attendancePct;
        const barColor = pct >= 75 ? "#00e676" : pct >= 60 ? "#ffab00" : "#ff4060";
        const checked = selectedIds.has(s.id) ? "checked" : "";
        const initial = s.name.charAt(0);
        return `<tr style="cursor:pointer;transition:var(--transition)" onclick="openDetail(${s.id})">
          <td onclick="event.stopPropagation()"><input type="checkbox" class="row-check" ${checked} onchange="toggleSelect(${s.id}, this.checked)"></td>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:34px;height:34px;border-radius:8px;background:${s.avatarColor}18;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:${s.avatarColor}">${initial}</div>
              <div>
                <div style="font-weight:500;font-size:13px">${s.name}</div>
                <small style="color:var(--text-muted);font-size:10px">${s.roll}</small>
              </div>
            </div>
          </td>
          <td class="hide-mobile" style="font-size:13px">${s.class}</td>
          <td class="hide-mobile"><span class="chip chip-dept">${s.deptName}</span></td>
          <td><div style="display:flex;align-items:center;gap:8px">
            <div style="width:60px;height:5px;background:var(--border);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${barColor};border-radius:3px"></div>
            </div>
            <span style="font-size:12px;font-weight:600;color:${barColor}">${pct}%</span>
          </div></td>
          <td><span class="badge ${pct >= 75 ? 'badge-success' : pct >= 60 ? 'badge-warning' : 'badge-danger'}">${pct >= 75 ? 'Good' : pct >= 60 ? 'Warning' : 'Critical'}</span></td>
          <td><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openDetail(${s.id})"><i class="fas fa-eye"></i></button></td>
        </tr>`;
      }).join("");
      if (!page.length) body.innerHTML = '<tr><td colspan="7" class="empty-state" style="padding:40px"><i class="fas fa-search"></i><p>No students match your filters</p></td></tr>';
    }

    function renderGrid(page) {
      const body = document.getElementById("gridBody");
      body.innerHTML = page.map(s => {
        const pct = s.attendancePct;
        const barColor = pct >= 75 ? "#00e676" : pct >= 60 ? "#ffab00" : "#ff4060";
        const initial = s.name.charAt(0);
        return `<div class="student-card" onclick="openDetail(${s.id})">
          <div class="savatar" style="background:${s.avatarColor}">${initial}</div>
          <div class="sname">${s.name}</div>
          <div class="smeta">${s.roll} Â· ${s.class}</div>
          <div class="s-contact">
            <span><i class="fas fa-envelope"></i>${s.email || '-'}</span>
            <span><i class="fas fa-phone"></i>${s.phone || '-'}</span>
          </div>
          <div style="margin-top:6px;display:flex;gap:4px">
            <span class="chip chip-dept">${s.deptName}</span>
          </div>
          <div class="sbar"><div class="sbar-fill" style="width:${pct}%;background:${barColor}"></div></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
            <span style="font-size:18px;font-weight:700;color:${barColor}">${pct}%</span>
            <span class="badge ${pct >= 75 ? 'badge-success' : pct >= 60 ? 'badge-warning' : 'badge-danger'}">${pct >= 75 ? 'Good' : pct >= 60 ? 'Warning' : 'Critical'}</span>
          </div>
        </div>`;
      }).join("");
      if (!page.length) body.innerHTML = '<div class="empty-state" style="grid-column:1/-1;padding:40px"><i class="fas fa-search"></i><p>No students match your filters</p></div>';
    }

    function renderPagination(totalPages) {
      const el = document.getElementById("pagination");
      let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (i === currentPage - 2 || i === currentPage + 2) {
          html += `<button class="page-btn" disabled>â€¦</button>`;
        }
      }
      html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
      el.innerHTML = html;
      const jump = document.getElementById("pageJumpInput");
      if (jump) jump.max = totalPages;
    }

    function goPage(p) {
      const pageSize = parseInt(document.getElementById("pageSize").value);
      const totalPages = Math.ceil(filteredStudents.length / pageSize) || 1;
      if (p < 1 || p > totalPages) return;
      currentPage = p;
      renderStudents();
    }

    function jumpToPage() {
      const input = document.getElementById("pageJumpInput");
      const p = parseInt(input.value);
      const pageSize = parseInt(document.getElementById("pageSize").value);
      const totalPages = Math.ceil(filteredStudents.length / pageSize) || 1;
      if (p >= 1 && p <= totalPages) { goPage(p); input.value = ""; }
    }

    function sortBy(field) {
      if (sortField === field) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortField = field; sortDir = 'asc'; }
      document.querySelectorAll('.sort-header span').forEach(s => s.textContent = 'â†•');
      const el = document.getElementById('sort-' + field);
      if (el) el.textContent = sortDir === 'asc' ? 'â†‘' : 'â†“';
      renderStudents();
    }

    function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.view-btn[onclick*="${view}"]`).classList.add('active');
      document.getElementById('tableView').style.display = view === 'table' ? '' : 'none';
      document.getElementById('gridView').style.display = view === 'grid' ? '' : 'none';
    }

    function renderDistributionChart() {
      const s = Store.getStudents().map(st => {
        const pct = Store.calcAttendancePercent ? Store.calcAttendancePercent(st.id, 30) : st.attendance;
        return { ...st, attendancePct: pct };
      });
      const good = s.filter(st => st.attendancePct >= 75).length;
      const warn = s.filter(st => st.attendancePct >= 60 && st.attendancePct < 75).length;
      const crit = s.filter(st => st.attendancePct < 60).length;
      if (distChartInstance) distChartInstance.destroy();
      distChartInstance = new Chart(document.getElementById("distChart"), {
        type: "doughnut",
        data: {
          labels: ["Good (â‰¥75%)", "Warning (60-74%)", "Critical (<60%)"],
          datasets: [{ data: [good, warn, crit], backgroundColor: ["#00e676", "#ffab00", "#ff4060"], borderWidth: 0 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: "bottom", labels: { font: { size: 10 }, padding: 12 } } },
          cutout: "65%"
        }
      });
    }

    function toggleSelect(id, checked) {
      if (checked) selectedIds.add(id);
      else selectedIds.delete(id);
      updateBulkBar();
      const allChecked = filteredStudents.slice((currentPage - 1) * parseInt(document.getElementById("pageSize").value), currentPage * parseInt(document.getElementById("pageSize").value)).every(s => selectedIds.has(s.id));
      document.getElementById("selectAll").checked = allChecked;
    }

    function toggleSelectAll(el) {
      const pageSize = parseInt(document.getElementById("pageSize").value);
      const page = filteredStudents.slice((currentPage - 1) * pageSize, currentPage * pageSize);
      page.forEach(s => { if (el.checked) selectedIds.add(s.id); else selectedIds.delete(s.id); });
      updateBulkBar();
      document.querySelectorAll("#tableBody .row-check").forEach(cb => cb.checked = el.checked);
    }

    function updateBulkBar() {
      const bar = document.getElementById("bulkBar");
      const count = document.getElementById("bulkCount");
      count.textContent = selectedIds.size;
      bar.classList.toggle("active", selectedIds.size > 0);
    }

    function clearSelection() {
      selectedIds.clear();
      document.getElementById("selectAll").checked = false;
      document.querySelectorAll("#tableBody .row-check").forEach(cb => cb.checked = false);
      updateBulkBar();
    }

    function exportSelectedCSV() {
      if (!selectedIds.size) { App.showToast("No students selected", "info"); return; }
      const students = filteredStudents.filter(s => selectedIds.has(s.id));
      let csv = "Name,Roll,Class,Department,Attendance%,Status,Email,Phone\n";
      students.forEach(s => {
        const status = s.attendancePct >= 75 ? "Good" : s.attendancePct >= 60 ? "Warning" : "Critical";
        csv += `"${s.name}",${s.roll},${s.class},"${s.deptName}",${s.attendancePct},${status},${s.email||''},${s.phone||''}\n`;
      });
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = `selected_students_${new Date().toISOString().split("T")[0]}.csv`; a.click();
      URL.revokeObjectURL(url);
      App.showToast(`${students.length} students exported`, "success");
    }

    function markSelected() {
      if (!selectedIds.size) { App.showToast("No students selected", "info"); return; }
      const today = new Date().toISOString().split("T")[0];
      let count = 0;
      selectedIds.forEach(id => {
        const student = Store.getStudents().find(s => s.id === id);
        if (!student) return;
        const existing = Store.getAttendance();
        const already = existing.find(r => r.date === today && r.studentId === id);
        if (!already) {
          Store.addAttendanceRecord([{
            id: `${today}-${id}-manual`,
            date: today, studentId: id, name: student.name, roll: student.roll,
            class: student.class, subject: "General", status: "present", markedBy: App.currentUser?.name || "manual"
          }]);
          count++;
        }
      });
      App.pushNotif(`Marked ${count} students present today`, "success");
      App.showToast(`${count} students marked present`, "success");
      clearSelection();
      renderStudents();
    }

    function openDetail(id) {
      currentStudentId = id;
      const student = Store.getStudents().find(s => s.id === id);
      if (!student) return;

      const pct = Store.calcAttendancePercent ? Store.calcAttendancePercent(id, 30) : student.attendance;
      const deptCode = student.class.replace(/[0-9]/g, '');
      const deptName = AppData.departments.find(d => d.code === deptCode)?.name || deptCode;
      const attendance = Store.getAttendance();
      const studentRecs = attendance.filter(r => r.studentId === id);
      const totalRecs = studentRecs.length;
      const presentCount = studentRecs.filter(r => r.status === "present").length;
      const absentCount = studentRecs.filter(r => r.status === "absent").length;
      const leaveCount = studentRecs.filter(r => r.status === "leave").length;
      const fees = Store.getFees().find(f => f.studentId === id);
      const leaves = Store.getLeaves().filter(l => l.studentId === id);

      const color = hashColor(student.name + student.roll);
      document.getElementById("detailAvatar").style.background = color;
      document.getElementById("detailAvatar").textContent = student.name.charAt(0);
      document.getElementById("detailName").textContent = student.name;
      document.getElementById("detailMeta").textContent = `${student.roll} Â· ${student.class} Â· ${deptName}`;
      document.getElementById("detailContact").innerHTML = `<i class="fas fa-envelope" style="margin-right:4px"></i>${student.email||'N/A'} &nbsp;Â·&nbsp; <i class="fas fa-phone" style="margin-right:4px"></i>${student.phone||'N/A'}`;

      const overview = buildOverviewTab(student, pct, presentCount, absentCount, leaveCount, totalRecs, fees, leaves);
      const attendanceTab = buildAttendanceTab(studentRecs, attendance);
      const feesTab = buildFeesTab(fees, student);
      const leavesTab = buildLeavesTab(leaves);
      document.getElementById("detailContent").innerHTML = overview + attendanceTab + feesTab + leavesTab;
      document.querySelectorAll('#detailContent > div').forEach(el => el.style.display = 'none');
      const first = document.getElementById("detailContent").querySelector('.tab-content-overview');
      if (first) first.style.display = 'block';

      document.getElementById("detailModal").classList.add("active");
    }

    function closeDetail() {
      document.getElementById("detailModal").classList.remove("active");
      currentStudentId = null;
    }

    function switchDetailTab(btn, tab) {
      document.querySelectorAll('#detailContent > div').forEach(el => el.style.display = 'none');
      document.querySelectorAll('#detailContent .tab-content-' + tab).forEach(el => el.style.display = 'block');
      document.querySelectorAll('[data-dtab]').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    }

    function buildOverviewTab(student, pct, presentCount, absentCount, leaveCount, totalRecs, fees, leaves) {
      const barColor = pct >= 75 ? "#00e676" : pct >= 60 ? "#ffab00" : "#ff4060";
      const deptCode = student.class.replace(/[0-9]/g, '');
      const deptName = AppData.departments.find(d => d.code === deptCode)?.name || deptCode;
      return `
        <div class="tab-content-overview">
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
            <div class="stat-card" style="border-left:3px solid #00e676;padding:14px">
              <div class="stat-info"><div class="stat-value" style="font-size:20px">${presentCount}</div><div class="stat-label">Present</div></div>
            </div>
            <div class="stat-card" style="border-left:3px solid #ff4060;padding:14px">
              <div class="stat-info"><div class="stat-value" style="font-size:20px">${absentCount}</div><div class="stat-label">Absent</div></div>
            </div>
            <div class="stat-card" style="border-left:3px solid #ffab00;padding:14px">
              <div class="stat-info"><div class="stat-value" style="font-size:20px">${leaveCount}</div><div class="stat-label">On Leave</div></div>
            </div>
          </div>
          <div style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
              <span style="color:var(--text-light)">Overall Attendance</span>
              <strong style="color:${barColor}">${pct}%</strong>
            </div>
            <div style="height:8px;background:var(--border);border-radius:6px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${barColor};border-radius:6px;transition:width .5s"></div>
            </div>
          </div>
          <div class="detail-row"><span class="detail-label"><i class="fas fa-id-card" style="width:16px;color:var(--text-muted)"></i> Roll Number</span><span class="detail-value">${student.roll}</span></div>
          <div class="detail-row"><span class="detail-label"><i class="fas fa-building" style="width:16px;color:var(--text-muted)"></i> Department</span><span class="detail-value">${deptName}</span></div>
          <div class="detail-row"><span class="detail-label"><i class="fas fa-chalkboard" style="width:16px;color:var(--text-muted)"></i> Class</span><span class="detail-value">${student.class}</span></div>
          <div class="detail-row"><span class="detail-label"><i class="fas fa-envelope" style="width:16px;color:var(--text-muted)"></i> Email</span><span class="detail-value">${student.email || 'N/A'}</span></div>
          <div class="detail-row"><span class="detail-label"><i class="fas fa-phone" style="width:16px;color:var(--text-muted)"></i> Phone</span><span class="detail-value">${student.phone || 'N/A'}</span></div>
          <div class="detail-row"><span class="detail-label"><i class="fas fa-wallet" style="width:16px;color:var(--text-muted)"></i> Fee Status</span><span class="detail-value ${fees?.status === 'paid' ? 'text-success' : 'text-warning'}">${fees ? (fees.status === 'paid' ? '<span style="color:var(--success)">Paid âœ“</span>' : '<span style="color:var(--warning)">Pending - à§³' + (fees.total - fees.paid).toLocaleString() + '</span>') : 'N/A'}</span></div>
          <div class="detail-row"><span class="detail-label"><i class="fas fa-door-open" style="width:16px;color:var(--text-muted)"></i> Leaves Applied</span><span class="detail-value">${leaves.length}</span></div>
          <div class="detail-row"><span class="detail-label"><i class="fas fa-clipboard-list" style="width:16px;color:var(--text-muted)"></i> Total Records</span><span class="detail-value">${totalRecs}</span></div>
        </div>`;
    }

    function buildAttendanceTab(records, allAttendance) {
      const subjects = {};
      records.forEach(r => {
        if (!subjects[r.subject]) subjects[r.subject] = { total: 0, present: 0 };
        subjects[r.subject].total++;
        if (r.status === "present") subjects[r.subject].present++;
      });
      const subjList = Object.entries(subjects);
      return `
        <div class="tab-content-attendance" style="display:none">
          ${subjList.length ? subjList.map(([subj, data]) => {
            const pct = Math.round((data.present / data.total) * 100);
            const color = pct >= 75 ? "#00e676" : pct >= 60 ? "#ffab00" : "#ff4060";
            return `<div class="subj-row">
              <span class="subj-name">${subj}</span>
              <span style="font-size:11px;color:var(--text-muted);width:40px">${data.present}/${data.total}</span>
              <div class="subj-bar"><div style="width:${pct}%;background:${color}"></div></div>
              <span class="subj-pct" style="color:${color}">${pct}%</span>
            </div>`;
          }).join("") : '<div class="empty-state" style="padding:20px"><i class="fas fa-chart-bar"></i><p>No attendance records found</p></div>'}
          <div style="margin-top:12px;text-align:center">
            <small style="color:var(--text-muted)">Subject-wise attendance breakdown (last 30 days)</small>
          </div>
        </div>`;
    }

    function buildFeesTab(fees, student) {
      if (!fees) return `<div class="tab-content-fees" style="display:none"><div class="empty-state" style="padding:20px"><i class="fas fa-wallet"></i><p>No fee records found</p></div></div>`;
      const paid = fees.paid;
      const total = fees.total;
      const pct = Math.round((paid / total) * 100);
      return `
        <div class="tab-content-fees" style="display:none">
          <div style="text-align:center;margin-bottom:16px">
            <div style="font-size:32px;font-weight:700;color:${fees.status === 'paid' ? 'var(--success)' : 'var(--warning)'}">à§³${paid.toLocaleString()}</div>
            <div style="color:var(--text-light);font-size:12px">of à§³${total.toLocaleString()} paid</div>
          </div>
          <div style="height:8px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:12px">
            <div style="height:100%;width:${pct}%;background:${fees.status === 'paid' ? 'var(--success)' : 'linear-gradient(90deg,var(--warning),var(--primary))'};border-radius:6px"></div>
          </div>
          <div class="detail-row"><span class="detail-label">Total Fee</span><span class="detail-value">à§³${total.toLocaleString()}</span></div>
          <div class="detail-row"><span class="detail-label">Amount Paid</span><span class="detail-value" style="color:var(--success)">à§³${paid.toLocaleString()}</span></div>
          <div class="detail-row"><span class="detail-label">Balance</span><span class="detail-value" style="color:${fees.status === 'paid' ? 'var(--success)' : 'var(--danger)'}">${fees.status === 'paid' ? 'No dues' : 'à§³' + (total - paid).toLocaleString()}</span></div>
          <div class="detail-row"><span class="detail-label">Due Date</span><span class="detail-value">${fees.dueDate || 'N/A'}</span></div>
          <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${fees.status === 'paid' ? '<span style="color:var(--success)">Paid âœ“</span>' : '<span style="color:var(--warning)">Pending</span>'}</span></div>
          ${fees.status !== 'paid' ? `<div style="margin-top:12px;text-align:center"><button class="btn btn-sm btn-primary" onclick="App.showToast('Payment gateway integrated','info')"><i class="fas fa-credit-card"></i> Pay Now</button></div>` : ''}
        </div>`;
    }

    function buildLeavesTab(leaves) {
      if (!leaves.length) return `<div class="tab-content-leaves" style="display:none"><div class="empty-state" style="padding:20px"><i class="fas fa-door-open"></i><p>No leave applications found</p></div></div>`;
      return `
        <div class="tab-content-leaves" style="display:none">
          ${leaves.sort((a, b) => new Date(b.from) - new Date(a.from)).slice(0, 10).map(l => {
            const statusColors = { approved: "var(--success)", pending: "var(--warning)", rejected: "var(--danger)" };
            const statusIcons = { approved: "fa-check-circle", pending: "fa-clock", rejected: "fa-times-circle" };
            return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
              <i class="fas ${statusIcons[l.status] || 'fa-info-circle'}" style="color:${statusColors[l.status] || 'var(--text-muted)'};font-size:14px;width:18px"></i>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:500">${l.type}</div>
                <small style="color:var(--text-muted);font-size:11px">${l.from} â†’ ${l.to} Â· ${l.reason}</small>
              </div>
              <span class="badge ${l.status === 'approved' ? 'badge-success' : l.status === 'pending' ? 'badge-warning' : 'badge-danger'}" style="font-size:9px">${l.status}</span>
            </div>`;
          }).join("")}
        </div>`;
    }

    function exportStudentCSV() {
      const students = filteredStudents.length ? filteredStudents : getStudents();
      let csv = "Name,Roll,Class,Department,Attendance%,Status,Email,Phone\n";
      students.forEach(s => {
        const status = s.attendancePct >= 75 ? "Good" : s.attendancePct >= 60 ? "Warning" : "Critical";
        csv += `"${s.name}",${s.roll},${s.class},"${s.deptName}",${s.attendancePct},${status},${s.email||''},${s.phone||''}\n`;
      });
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = `students_${new Date().toISOString().split("T")[0]}.csv`; a.click();
      URL.revokeObjectURL(url);
      App.showToast("CSV exported", "success");
    }
  </script>
</body>
</html>
